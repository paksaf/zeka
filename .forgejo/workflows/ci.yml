# Standard INTERACT CI — Flutter  (host-mode forgejo-runner)
# DO NOT edit per-repo: generated by _ops/ci/rollout-ci.sh.
# Requires Flutter on the runner host PATH (see _ops/ci/CI_STANDARD.md -> host prep).
name: CI
on:
  push:
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Flutter version
        run: flutter --version
      - name: Resolve pubspec dir
        id: app
        run: |
          # support repos where the Flutter app is in a subdir (e.g. mobile/)
          if [ -f pubspec.yaml ]; then echo "dir=." >> "$GITHUB_OUTPUT";
          elif [ -f mobile/pubspec.yaml ]; then echo "dir=mobile" >> "$GITHUB_OUTPUT";
          else echo "dir=." >> "$GITHUB_OUTPUT"; fi
      - name: Pub get
        run: cd "${{ steps.app.outputs.dir }}" && flutter pub get
      - name: Analyze
        run: cd "${{ steps.app.outputs.dir }}" && flutter analyze
      - name: Test
        run: |
          cd "${{ steps.app.outputs.dir }}"
          if [ -d test ]; then flutter test; else echo "no test/ dir — skipping"; fi
